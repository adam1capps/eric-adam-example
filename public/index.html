<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RoofView Demo Co | Sign In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,500;0,9..40,700;1,9..40,400&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/shared.css">
  <link rel="stylesheet" href="/css/login.css">
</head>
<body>

  <div class="login-page">
    <div class="login-wrapper">
      <div class="login-card">
        <div class="login-brand">
          <div class="logo-mark" style="font-family: var(--font-display);">Roof<span>View</span></div>
          <div class="logo-tag">Demo Co</div>
        </div>

        <form class="login-form" id="loginForm">
          <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" autocomplete="username" required>
          </div>
          <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" autocomplete="current-password" required>
          </div>
          <div class="login-error" id="loginError"></div>
          <button type="submit" class="btn btn-primary" id="loginSubmit">Sign In</button>
        </form>
      </div>
    </div>

    <footer>
      <strong>RoofView Demo Co</strong> &middot; Built with Neon + Netlify + Git &middot; Demo Application
    </footer>
  </div>

  <div class="toast" id="toast"></div>

  <script src="/js/shared.js"></script>
  <script src="/js/login.js"></script>

</body>
</html>
